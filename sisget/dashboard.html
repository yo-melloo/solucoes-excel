<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>SISGET - Gestão de Ocorrências</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --sn-red: #d32f2f; --sn-dark: #121212; --sn-card: #1e1e1e; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: white; display: flex; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 400px; height: 100vh; background: var(--sn-dark); border-right: 1px solid #333; display: flex; flex-direction: column; }
        .header { padding: 20px; background: var(--sn-red); text-align: center; }
        .header h1 { margin: 0; font-size: 20px; text-transform: uppercase; letter-spacing: 2px; }
        
        .search-area { padding: 15px; background: #1a1a1a; }
        .search-input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #444; background: #000; color: white; box-sizing: border-box; }

        .list-container { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .v-card { 
            background: var(--sn-card); margin-bottom: 10px; padding: 12px; border-radius: 8px; 
            border-left: 4px solid #444; cursor: pointer; transition: 0.2s; position: relative;
        }
        .v-card:hover { background: #252525; }
        .v-card.has-note { border-left-color: #ff9800 !important; }
        .v-card .prefix { font-size: 18px; font-weight: bold; }
        .v-card .meta { font-size: 11px; color: #888; margin-top: 4px; }
        .v-card .badge-note { 
            position: absolute; top: 12px; right: 12px; background: #ff9800; 
            color: black; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold;
        }

        /* Modal / Form */
        #occurrence-panel { 
            position: fixed; bottom: 20px; left: 420px; right: 20px; 
            background: #fff; color: #333; padding: 20px; border-radius: 12px; 
            z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none; border-top: 5px solid var(--sn-red);
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 12px; }
        .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; height: 60px; font-family: inherit; }
        .btn-save { background: #2e7d32; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        .btn-close { background: #666; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; float: right; }

        #map { flex-grow: 1; height: 100vh; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="header"><h1>SISGET <small>FROTA</small></h1></div>
        <div class="search-area">
            <input type="text" id="search" class="search-input" placeholder="Buscar prefixo (ex: 20016)..." onkeyup="render()">
        </div>
        <div id="list" class="list-container"></div>
    </div>

    <div id="map"></div>

    <!-- Painel de Ocorrência -->
    <div id="occurrence-panel">
        <button class="btn-close" onclick="closePanel()">Fechar</button>
        <h3 id="panel-title" style="margin-top:0">Ocorrência: #20016</h3>
        <div class="form-group">
            <label>Relato da Ocorrência:</label>
            <textarea id="occurrence-text" placeholder="Ex: Retentor furado, manutenção de IMP irá avaliar..."></textarea>
        </div>
        <button class="btn-save" onclick="saveOccurrence()">Salvar Ocorrência</button>
        <button onclick="clearOccurrence()" style="background:none; border:none; color:#d32f2f; cursor:pointer; font-size:12px; margin-left:10px;">Remover Ocorrência</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="bot/fleet_data.js"></script>

    <script>
        const map = L.map('map').setView([-15.7942, -47.8822], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

        let fleet = [];
        let markers = L.layerGroup().addTo(map);
        let selectedCarId = null;

        // Banco de dados local (Browser)
        const db = {
            get: (id) => localStorage.getItem('sn_occ_' + id),
            set: (id, text) => localStorage.setItem('sn_occ_' + id, text),
            remove: (id) => localStorage.removeItem('sn_occ_' + id),
            all: () => {
                const keys = Object.keys(localStorage).filter(k => k.startsWith('sn_occ_'));
                return keys.map(k => k.replace('sn_occ_', ''));
            }
        };

        function init() {
            if (!window.fleetData) return;
            fleet = window.fleetData.map(v => ({
                ...v,
                id: v.VEICPREFIXO || v.VEICCODIGO,
                lat: parseFloat(v.RASTLATITUDE),
                lng: parseFloat(v.RASTLONGITUDE)
            }));
            render();
        }

        function render() {
            markers.clearLayers();
            const listEl = document.getElementById('list');
            listEl.innerHTML = '';
            const search = document.getElementById('search').value.toLowerCase();
            const occWithNotes = db.all();

            fleet.filter(v => v.id.toLowerCase().includes(search)).forEach(v => {
                const hasNote = occWithNotes.includes(v.id);
                const pos = [v.lat, v.lng];

                if (!isNaN(pos[0])) {
                    // Marcador no mapa
                    const circle = L.circleMarker(pos, {
                        radius: hasNote ? 12 : 8,
                        color: hasNote ? '#ff9800' : 'white',
                        weight: 2,
                        fillColor: hasNote ? '#ff9800' : (parseInt(v.RASTVELOCIDADE) > 0 ? '#4caf50' : '#d32f2f'),
                        fillOpacity: 0.9
                    }).addTo(markers);

                    circle.bindPopup(`<b>#${v.id}</b><br>${hasNote ? '⚠️ <b>'+db.get(v.id)+'</b>' : 'Sem ocorrências'}`);

                    // Card na lista
                    const card = document.createElement('div');
                    card.className = `v-card ${hasNote ? 'has-note' : ''}`;
                    card.innerHTML = `
                        <div class="prefix">#${v.id}</div>
                        ${hasNote ? '<div class="badge-note">OCORRÊNCIA</div>' : ''}
                        <div class="meta">${v.VEICPLACA} • ${v.RASTVELOCIDADE} KM/H</div>
                        ${hasNote ? `<div style="color:#ff9800; font-size:11px; margin-top:5px;"><b>Obs:</b> ${db.get(v.id)}</div>` : ''}
                    `;
                    card.onclick = () => {
                        map.setView(pos, 15);
                        circle.openPopup();
                        openPanel(v.id);
                    };
                    listEl.appendChild(card);
                }
            });
        }

        function openPanel(id) {
            selectedCarId = id;
            document.getElementById('panel-title').innerText = `Ocorrência: #${id}`;
            document.getElementById('occurrence-text').value = db.get(id) || '';
            document.getElementById('occurrence-panel').style.display = 'block';
        }

        function closePanel() {
            document.getElementById('occurrence-panel').style.display = 'none';
        }

        function saveOccurrence() {
            const text = document.getElementById('occurrence-text').value;
            if (text.trim()) {
                db.set(selectedCarId, text);
                render();
                closePanel();
            }
        }

        function clearOccurrence() {
            db.remove(selectedCarId);
            render();
            closePanel();
        }

        init();
    </script>
</body>
</html>
